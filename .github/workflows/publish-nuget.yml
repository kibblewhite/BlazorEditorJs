name: Publish NuGet Packages

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack EditorJs.Configuration
        run: dotnet pack EditorJs.Configuration/EditorJs.Configuration.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack EditorJs
        run: dotnet pack EditorJs/EditorJs.csproj --configuration Release --no-build --output ./nupkgs

      - name: Push EditorJs.Configuration to NuGet
        run: dotnet nuget push ./nupkgs/EditorJs.Configuration.*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push EditorJs to NuGet
        run: dotnet nuget push ./nupkgs/EditorJs.*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
